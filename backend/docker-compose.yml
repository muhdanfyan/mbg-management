services:
  db:
    image: mysql:8.0
    container_name: mbg_mysql
    restart: always
    environment:
      MYSQL_DATABASE: mbg_management
      MYSQL_USER: kassaone
      MYSQL_PASSWORD: Piblajar2020
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: mbg_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_DSN: "kassaone:Piblajar2020@tcp(db:3306)/mbg_management?charset=utf8mb4&parseTime=True&loc=Local"

volumes:
  mysql_data:
